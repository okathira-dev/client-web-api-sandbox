# ref: https://ja.vitejs.dev/guide/static-deploy.html#github-pages
# 静的コンテンツを GitHub Pages にデプロイするためのワークフロー
name: Deploy static content to Pages

on:
  # デフォルトブランチを対象としたプッシュ時に実行されます
  push:
    branches: [ "main" ]

  # Actions タブから手動でワークフローを実行できるようにします
  workflow_dispatch:

    # GITHUB_TOKEN のパーミッションを設定し、GitHub Pages へのデプロイを許可します
permissions:
  contents: read

# 再実行時に artifact 名が衝突しないよう、run_attempt を含める
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PAGES_ARTIFACT_NAME: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

# 1 つの同時デプロイメントを可能にする
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup toolchain
        uses: ./.github/actions/setup-node-npm
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b
      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: "./dist"

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}
